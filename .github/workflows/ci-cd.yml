name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t voicechess-backend:test .
          echo "✅ Docker build successful!"

  deploy:
    name: Deploy to VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          POSTGRESQL_URL: ${{ secrets.POSTGRESQL_URL }}
          PORT: ${{ secrets.PORT }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GEMINI_API_KEY,POSTGRESQL_URL,PORT,AZURE_OPENAI_ENDPOINT,AZURE_OPENAI_API_KEY
          script: |
            cd /root/BE-VoiceChess || cd ~/BE-VoiceChess

            echo "📥 Pulling latest changes..."
            git pull origin main

            echo "📝 Creating .env.docker..."
            cat > .env.docker << EOF
            GEMINI_API_KEY=${GEMINI_API_KEY}
            PORT=${PORT}
            POSTGRESQL_URL=${POSTGRESQL_URL}
            AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
            AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
            EOF

            echo "🛑 Stopping containers..."
            docker-compose down || docker compose down

            echo "🏗️  Building new image..."
            docker-compose build --no-cache || docker compose build --no-cache

            echo "🚀 Starting containers..."
            docker-compose up -d || docker compose up -d

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment completed!"
            docker-compose ps || docker compose ps
