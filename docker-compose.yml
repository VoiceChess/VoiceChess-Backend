version: '3.8'

services:
  voicechess-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechess-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    networks:
      - voicechess-network

networks:
  voicechess-network:
    driver: bridge
