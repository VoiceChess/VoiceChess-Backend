version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: voicechess-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    networks:
      - voicechess-network
    volumes:
      - redis-data:/data

  voicechess-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechess-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      - redis
    networks:
      - voicechess-network

networks:
  voicechess-network:
    driver: bridge

volumes:
  redis-data:
