services:
  postgres:
    image: postgres:16-alpine
    container_name: voicechess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}
      POSTGRES_DB: voicechess
    networks:
      - voicechess-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  voicechess-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechess-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voicechess-network

networks:
  voicechess-network:
    driver: bridge

volumes:
  postgres-data:
