version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: voicechess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Iyan0512!}
      POSTGRES_DB: voicechess
    networks:
      - voicechess-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voicechess-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-Iyan0512!}
    command: redis-server --requirepass ${REDIS_PASSWORD:-Iyan0512!}
    env_file:
      - .env.docker
    networks:
      - voicechess-network
    volumes:
      - redis-data:/data

  voicechess-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechess-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - voicechess-network

networks:
  voicechess-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
