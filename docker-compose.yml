version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: voicechess-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-mydefaultpassword}
    env_file:
      - .env.docker
    networks:
      - voicechess-network
    volumes:
      - redis-data:/data

  voicechess-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechess-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      - redis
    networks:
      - voicechess-network

  nginx:
    image: nginx:alpine
    container_name: voicechess-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - voicechess-backend
    networks:
      - voicechess-network

  certbot:
    image: certbot/certbot
    container_name: voicechess-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  voicechess-network:
    driver: bridge

volumes:
  redis-data:
  certbot-etc:
  certbot-var:
  certbot-www:
