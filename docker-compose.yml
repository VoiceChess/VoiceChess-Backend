version: '3.8'

services:
  voicechess-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voicechess-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=8080
      - POSTGRESQL_URL=${POSTGRESQL_URL}
    networks:
      - voicechess-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  voicechess-network:
    driver: bridge
